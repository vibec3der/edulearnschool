<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLearn— Academic Courses & Resources</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

        /* --- IMPORTED THEME SYSTEM FROM EDULEARN LITE --- */
        :root {
            /* Navbar-style theme */
            --bg-color: rgba(16, 18, 22, 0.94);
            --bg-toolbar: rgba(16, 18, 22, 0.94);
            --text-main: #f6f3ff;
            --text-muted: rgba(255, 255, 255, 0.72);
            --accent: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-hover: rgba(255, 255, 255, 0.14);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.16);
            --accent-glow: rgba(255, 255, 255, 0.15);
            --grid-color: rgba(255, 255, 255, 0.02);
        }

        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* --- GAME LIST VIEW --- */
        #library-view {
            padding: 40px;
            overflow-y: auto;
            height: 100%;
            animation: fadeIn 0.4s ease;
            position: relative;
            z-index: 10;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: lowercase;
            color: var(--text-main);
            margin: 0;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: auto;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            background: var(--card-hover);
        }

        .card-body {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            transition: color 0.2s;
        }

        .game-card:hover .game-title {
            color: var(--accent);
        }

        .game-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            flex: 1;
            margin-bottom: 20px;
        }

        .game-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .tag {
            font-size: 11px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- GAMEPLAY VIEW --- */
        #game-view {
            display: none;
            flex-direction: column;
            height: 100%;
            background: var(--bg-color);
            position: relative;
            z-index: 20;
        }

        .toolbar {
            height: 60px;
            background: var(--bg-toolbar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--border-hover);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .current-game-title {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-main);
        }

        .controls-hint {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .key-badge {
            background: rgba(134, 239, 172, 0.05);
            border: 1px solid var(--border-color);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--accent);
            font-size: 11px;
        }

        iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            background: #000;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-hover);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Navbar CSS */
        #edulearn-global-navbar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            max-width: min(100%, 980px);
            width: auto;
            padding: 12px 16px;
            background: rgba(16, 18, 22, 0.94);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 999px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 10000;
            box-shadow: 0 24px 80px rgba(0,0,0,0.4);
            transition: transform 0.25s ease, opacity 0.25s ease;
        }

        #edulearn-global-navbar.collapsed {
            transform: translate(-50%, -120%);
            opacity: 0;
            pointer-events: none;
        }

        #edulearn-global-navbar .nav-ring {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        #edulearn-global-navbar .nav-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 16px;
            border: 1px solid transparent;
            background: rgba(255,255,255,0.08);
            color: #f6f3ff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

        #edulearn-global-navbar .nav-item i {
            font-size: 16px;
        }

        #edulearn-global-navbar .nav-item span {
            white-space: nowrap;
        }

        #edulearn-global-navbar .nav-item:hover,
        #edulearn-global-navbar .nav-item.active {
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,255,0.16);
            transform: translateY(-2px);
            color: #ffffff;
        }

        #edulearn-global-navbar .nav-icon {
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid transparent;
            background: rgba(255,255,255,0.08);
            color: #f6f3ff;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

        #edulearn-global-navbar .nav-icon:hover,
        #edulearn-global-navbar .nav-icon.active {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.18);
            transform: translateY(-1px);
            color: #ffffff;
        }

        #edulearn-navbar-collapse {
            width: 40px;
            height: 40px;
            font-size: 15px;
            background: rgba(255,255,255,0.08);
        }

        #edulearn-navbar-mini {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 38px;
            height: 30px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.16);
            color: #f7f3ff;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10001;
            box-shadow: 0 12px 28px rgba(0,0,0,0.28);
            font-size: 18px;
            padding: 0;
        }

        #edulearn-navbar-mini:hover {
            transform: translate(-50%, -1px);
        }
    </style>
</head>

<body>

    <div id="library-view">
        <div class="container">
            <header>
                <h1>Games that couldn't be added, recreated by AI</h1>
                <p class="subtitle">Curated HTML5 Selection</p>
            </header>
            <div id="game-container" class="game-grid">
                </div>
        </div>
    </div>

    <div id="game-view">
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn-back" onclick="closeGame()">
                    <i class="fa-solid fa-arrow-left"></i> Library
                </button>
                <span id="active-title" class="current-game-title">Game Title</span>
            </div>
            <div class="controls-hint" id="active-controls">
            </div>
        </div>
        <iframe id="game-frame" src="about:blank"></iframe>
    </div>

    <script>
        // --- CONFIGURATION: ADD GAMES HERE ---
        const gamesList = [
            {
                title: "Ballistic 2D",
                url: "./aigames/ballistic2d.html",
                desc: "A retro jetpack shooter that never ends. Survive as long as you can.",
                controls: "WASD, Space, Mouse, R",
                tags: ["Shooter", "Action"]
            },
            {
                title: "Space Invaders",
                url: "./aigames/spaceinvaders.html",
                desc: "Defend Earth from the alien wave in this classic arcade adaptation.",
                controls: "Arrow Keys, Space",
                tags: ["Arcade", "Classic"]
            },
            {
                title: "Pacman (Original)",
                url: "./aigames/pacman.html",
                desc: "Navigate the maze, eat dots, and avoid the colored ghosts. NOTE: this is glitchy, will be fixed soon.",
                controls: "Arrow Keys",
                tags: ["Arcade", "Strategy"]
            },
            {
                title: "Cyber Detention 2026",
                url: "./aigames/cyberdetention.html",
                desc: "Avoid Teachers in this gemini-made game and don't get caught!",
                controls: "Arrow Keys, Space",
                tags: ["Arcade", "Memes"]
            },
            {
                title: "Neon glide",
                url: "./aigames/neonglide.html",
                desc: "Glide through obstacles. Made by gemini",
                controls: "Arrow Keys, P",
                tags: ["Arcade", "Speed"]
            }
        ];

        // --- SYSTEM LOGIC ---

        const container = document.getElementById('game-container');
        const libraryView = document.getElementById('library-view');
        const gameView = document.getElementById('game-view');
        const gameFrame = document.getElementById('game-frame');
        const activeTitle = document.getElementById('active-title');
        const activeControls = document.getElementById('active-controls');

        // 1. Render Games
        function renderLibrary() {
            container.innerHTML = '';
            gamesList.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => launchGame(game);

                // Generate Tags HTML
                const tagsHtml = game.tags.map(t => `<span class="tag">${t}</span>`).join('');

                card.innerHTML = `
                    <div class="card-body">
                        <div class="game-title">${game.title}</div>
                        <div class="game-desc">${game.desc}</div>
                        <div class="game-tags">${tagsHtml}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 2. Launch Game
        function launchGame(game) {
            libraryView.style.display = 'none';
            gameView.style.display = 'flex';
            
            activeTitle.innerText = game.title;
            gameFrame.src = game.url;
            
            // Format controls display
            if(game.controls) {
                activeControls.innerHTML = `<i class="fa-solid fa-keyboard"></i> <span class="key-badge">${game.controls}</span>`;
            } else {
                activeControls.innerHTML = '';
            }
        }

        // 3. Close Game
        function closeGame() {
            gameFrame.src = 'about:blank'; // Stop game execution
            gameView.style.display = 'none';
            libraryView.style.display = 'block';
        }

        // Initialize Library on Load
        window.onload = renderLibrary;

    </script>
</body>

</html>
