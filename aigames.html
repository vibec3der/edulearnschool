<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

        /* --- IMPORTED THEME SYSTEM FROM EDULEARN LITE --- */
        :root {
            /* Default: Midnight Indigo / Mint */
            --bg-color: #09090b;
            --bg-toolbar: rgba(9, 9, 11, 0.85);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #86efac;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-hover: rgba(134, 239, 172, 0.05);
            --border-color: #27272a;
            --border-hover: #3f3f46;
            --accent-glow: rgba(134, 239, 172, 0.15);
            --grid-color: rgba(255, 255, 255, 0.02);
        }

        body.theme-mocha {
            --bg-color: #1e1e2e;
            --bg-toolbar: rgba(30, 30, 46, 0.85);
            --text-main: #cdd6f4;
            --text-muted: #a6adc8;
            --accent: #cba6f7;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-hover: rgba(203, 166, 247, 0.05);
            --border-color: #313244;
            --border-hover: #45475a;
            --accent-glow: rgba(203, 166, 247, 0.15);
            --grid-color: rgba(255, 255, 255, 0.02);
        }

        body.theme-inverted {
            --bg-color: #f4f4f5;
            --bg-toolbar: rgba(244, 244, 245, 0.85);
            --text-main: #18181b;
            --text-muted: #52525b;
            --accent: #4f46e5;
            --card-bg: rgba(0, 0, 0, 0.02);
            --card-hover: rgba(79, 70, 229, 0.05);
            --border-color: #e4e4e7;
            --border-hover: #d4d4d8;
            --accent-glow: rgba(79, 70, 229, 0.15);
            --grid-color: rgba(0, 0, 0, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
            
            /* The Static Background Grid */
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- GAME LIST VIEW --- */
        #library-view {
            padding: 40px;
            overflow-y: auto;
            height: 100%;
            animation: fadeIn 0.4s ease;
            position: relative;
            z-index: 10;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: lowercase;
            color: var(--text-main);
            margin: 0;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: auto;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            background: var(--card-hover);
        }

        .card-body {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            transition: color 0.2s;
        }

        .game-card:hover .game-title {
            color: var(--accent);
        }

        .game-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            flex: 1;
            margin-bottom: 20px;
        }

        .game-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .tag {
            font-size: 11px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- GAMEPLAY VIEW --- */
        #game-view {
            display: none;
            flex-direction: column;
            height: 100%;
            background: var(--bg-color);
            position: relative;
            z-index: 20;
        }

        .toolbar {
            height: 60px;
            background: var(--bg-toolbar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--border-hover);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .current-game-title {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-main);
        }

        .controls-hint {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .key-badge {
            background: rgba(134, 239, 172, 0.05);
            border: 1px solid var(--border-color);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--accent);
            font-size: 11px;
        }

        iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            background: #000;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-hover);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>

<body>

    <div id="library-view">
        <div class="container">
            <header>
                <h1>ai games</h1>
                <p class="subtitle">Curated HTML5 Selection</p>
            </header>
            <div id="game-container" class="game-grid">
                </div>
        </div>
    </div>

    <div id="game-view">
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn-back" onclick="closeGame()">
                    <i class="fa-solid fa-arrow-left"></i> Library
                </button>
                <span id="active-title" class="current-game-title">Game Title</span>
            </div>
            <div class="controls-hint" id="active-controls">
            </div>
        </div>
        <iframe id="game-frame" src="about:blank"></iframe>
    </div>

    <script>
        // --- CONFIGURATION: ADD GAMES HERE ---
        const gamesList = [
            {
                title: "Ballistic 2D",
                url: "./aigames/ballistic2d.html",
                desc: "A retro jetpack shooter that never ends. Survive as long as you can.",
                controls: "WASD, Space, Mouse, R",
                tags: ["Shooter", "Action"]
            },
            {
                title: "Space Invaders",
                url: "./aigames/spaceinvaders.html",
                desc: "Defend Earth from the alien wave in this classic arcade adaptation.",
                controls: "Arrow Keys, Space",
                tags: ["Arcade", "Classic"]
            },
            {
                title: "Pacman (Original)",
                url: "./aigames/pacman.html",
                desc: "Navigate the maze, eat dots, and avoid the colored ghosts. NOTE: this is glitchy, will be fixed soon.",
                controls: "Arrow Keys",
                tags: ["Arcade", "Strategy"]
            },
            {
                title: "Cyber Detention 2026",
                url: "./aigames/cyberdetention.html",
                desc: "Avoid Teachers in this gemini-made game and don't get caught!",
                controls: "Arrow Keys, Space",
                tags: ["Arcade", "Memes"]
            },
            {
                title: "Neon glide",
                url: "./aigames/neonglide.html",
                desc: "Glide through obstacles. Made by gemini",
                controls: "Arrow Keys, P",
                tags: ["Arcade", "Speed"]
            }
        ];

        // --- SYSTEM LOGIC ---

        const container = document.getElementById('game-container');
        const libraryView = document.getElementById('library-view');
        const gameView = document.getElementById('game-view');
        const gameFrame = document.getElementById('game-frame');
        const activeTitle = document.getElementById('active-title');
        const activeControls = document.getElementById('active-controls');

        // 1. Render Games
        function renderLibrary() {
            container.innerHTML = '';
            gamesList.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => launchGame(game);

                // Generate Tags HTML
                const tagsHtml = game.tags.map(t => `<span class="tag">${t}</span>`).join('');

                card.innerHTML = `
                    <div class="card-body">
                        <div class="game-title">${game.title}</div>
                        <div class="game-desc">${game.desc}</div>
                        <div class="game-tags">${tagsHtml}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 2. Launch Game
        function launchGame(game) {
            libraryView.style.display = 'none';
            gameView.style.display = 'flex';
            
            activeTitle.innerText = game.title;
            gameFrame.src = game.url;
            
            // Format controls display
            if(game.controls) {
                activeControls.innerHTML = `<i class="fa-solid fa-keyboard"></i> <span class="key-badge">${game.controls}</span>`;
            } else {
                activeControls.innerHTML = '';
            }
        }

        // 3. Close Game
        function closeGame() {
            gameFrame.src = 'about:blank'; // Stop game execution
            gameView.style.display = 'none';
            libraryView.style.display = 'block';
        }

        // Initialize Library on Load
        window.onload = renderLibrary;

        // --- EDULEARN THEME SYNC ---
        function syncEdulearnTheme() {
            try {
                // Fetch settings from local storage
                const savedSettings = JSON.parse(localStorage.getItem('el_settings')) || {};
                const theme = savedSettings.theme || 'default';
                const bgUrl = savedSettings.bgUrl || '';

                // Apply correct theme class
                document.body.className = theme === 'default' ? '' : `theme-${theme}`;

                // Apply custom background image if set
                if (bgUrl) {
                    document.body.style.backgroundImage = `url('${bgUrl}')`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundAttachment = 'fixed';
                } else {
                    // Reset to grid pattern if no custom background is applied
                    document.body.style.backgroundImage = `
                        linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                        linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px)
                    `;
                    document.body.style.backgroundSize = '40px 40px';
                }
            } catch (err) {
                console.error("Theme sync failed:", err);
            }
        }

        // Run theme sync immediately 
        syncEdulearnTheme();

        // Listen for changes across other pages/frames
        window.addEventListener('storage', (e) => {
            if (e.key === 'el_settings') {
                syncEdulearnTheme();
            }
        });

    </script>
</body>

</html>
