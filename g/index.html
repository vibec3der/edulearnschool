<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fb2651">

    <title>EduLearn— Academic Courses & Resources</title>
    <meta name="title" content="Edulearn | Special Content"> 
    
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <link rel="stylesheet" href="style.css">
    <style>
        /* --- IMPORTED THEME SYSTEM FROM EDULEARN LITE --- */
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --modal-bg: #0a0a0a;
            --modal-border: #222222;
            --input-bg: #000000;
            --input-border: #333333;
            --pill-hover: rgba(255, 255, 255, 0.1);
            --pill-active: #222222;
            --accent-glow: rgba(255, 255, 255, 0.1);
        }

        /* --- THEMES --- */
        [data-theme="sakura"] {
            --bg-color: #fdf6f5;
            --text-main: #4a3b3c;
            --text-muted: #9e8487;
            --modal-bg: #ffffff;
            --modal-border: #f0e4e4;
            --input-bg: #fdf6f5;
            --input-border: #e6d3d3;
            --pill-hover: rgba(255, 183, 197, 0.4);
            --accent-glow: rgba(255, 183, 197, 0.3);
        }

        [data-theme="red"] {
            --bg-color: #0a0000;
            --text-main: #ff4d4d;
            --text-muted: #802b2b;
            --modal-bg: #140000;
            --modal-border: #330000;
            --input-bg: #0a0000;
            --input-border: #4d0000;
            --pill-hover: rgba(255, 0, 0, 0.15);
            --accent-glow: rgba(255, 77, 77, 0.2);
        }

        [data-theme="azure"] {
            --bg-color: #faf9f8;
            --text-main: #323130;
            --text-muted: #605e5c;
            --modal-bg: #ffffff;
            --modal-border: #edebe9;
            --input-bg: #ffffff;
            --input-border: #8a8886;
            --pill-hover: #f3f2f1;
            --accent-glow: rgba(0, 120, 212, 0.2);
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #16213e 100%);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            margin: 0;
            font-family: sans-serif;
        }

        /* Helper styles */
        .section-summary { font-size: 1.2rem; font-weight: bold; cursor: pointer; user-select: none; }
        .hidden { display: none; }

        /* --- NEW STYLES: White Outlines & Forced Images --- */
        .zone-container div, .game-card, .zone-card {
            border: 2px solid #ffffff !important;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
        }

        .zone-container img, .game-card img, .zone-card img {
            display: block !important; 
            opacity: 1 !important;
            visibility: visible !important;
            width: 100%;
            height: auto;
        }

        .zone-item.text-only {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 2px solid rgba(255, 255, 255, 0.1);
            min-height: 80px;
            justify-content: center;
            align-items: center;
        }

        .zone-item.text-only button {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .zone-item.text-only:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        #zoneViewer {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            justify-content: center;
            align-items: center;
            z-index: 10010;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        #zoneViewer.active {
            display: flex;
        }

        .sandbox-container {
            width: 85%;
            max-width: 1000px;
            height: 85vh;
            background: rgba(12, 19, 37, 0.96);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: -45px; /* Adjust based on your preference */
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            z-index: 10000;
        }

        #zoneFrame {
            flex-grow: 1;
            border: none;
            width: 100%;
            background: #fff;
        }

        /* The Dark Bottom Toolbar */
        .sandbox-toolbar {
            background-color: #1a2327; /* Dark slate */
            padding: 12px 20px;
            display: flex;
            gap: 12px;
        }

        .sandbox-toolbar button {
            background-color: #263338;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }

        .sandbox-toolbar button:hover { background-color: #37474f; }
        .sandbox-toolbar button svg { width: 20px; height: 20px; fill: white; }
    </style>
</head>

<body>
    
    <header>
        <div class="header-content">
            <a href="/h/" class="logo" style="text-decoration: none; color: inherit;"> Home </a>
            
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="Search zones..." aria-label="Search zones" oninput="filterZones()">
                
                <select id="sortOptions" aria-label="Sort zones" onchange="sortZones()">
                    <option value="name">Name</option>
                    <option value="id">ID (Date)</option>
                    <option value="popular">Popular</option>
                </select>
                
                <select id="filterOptions" aria-label="Filter by tag" onchange="filterZones2()">
                    <option value="none">(SELECT TAG)</option>
                </select>
            </div>

            <div class="control-buttons">
                <button id="refresh" class="control-button" title="Refresh all zones" aria-label="Refresh" onclick="listZones()">
                    <img src="refresh-icon.png" alt="" aria-hidden="true">
                </button>

                <button id="settings" class="control-button" title="Settings" aria-label="Settings">
                    <img src="setting.png" alt="" aria-hidden="true">
                </button>
            </div>
        </div>
    </header>

    <main>
        <br>

        <details id="featuredZonesWrapper" open>
            <summary id="allZonesSummary" class="section-summary">Featured</summary>
            <div id="featuredZones" class="zone-container"></div>
        </details>
        
        <br><hr><br>

        <details id="allZonesWrapper" open>
            <summary id="allSummary" class="section-summary">All Games</summary>
            <div id="container">Loading Your Content...</div>
        </details>
    </main>

    <div id="zoneViewer">
        <div class="sandbox-container">
            
            <iframe id="zoneFrame" title="Game Content"></iframe>
            
            <div class="sandbox-toolbar">
                <button onclick="fullscreenZone()" title="Fullscreen">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
                
                <button onclick="document.getElementById('zoneFrame').src = document.getElementById('zoneFrame').src" title="Refresh">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
                
                <button onclick="navigator.clipboard.writeText(document.getElementById('zoneFrame').src); alert('Link copied!');" title="Copy Link">
                    <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
                </button>
                
                <button onclick="aboutBlank()" title="Open in New Tab">
                    <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                </button>
                
                <button onclick="downloadZone()" title="Download">
                    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                </button>

                <button onclick="closeZone()" title="Close Sandbox" style="margin-left: auto; color: #ff5555; font-weight: bold; background: transparent;">
                    ✖
                </button>
            </div>
        </div>
    </div>
    
    <div id="popupOverlay" class="hidden">
        <div class="popup">
            <div class="popup-header">
                <h3 id="popupTitle">Title</h3>
                <button id="popupClose" onclick="closePopup()" aria-label="Close Popup">×</button>
            </div>
            <div id="popupBody">
                Content will be here
            </div>
        </div>
    </div>

    

    <script src="/script.js" defer></script>
    <script src="script.js" defer></script>
    <script>
        // --- EDULEARN THEME SYNC ---
        function syncEdulearnTheme() {
            try {
                const savedSettings = JSON.parse(localStorage.getItem('el_settings')) || {};
                const theme = savedSettings.theme || 'default';
                const bgUrl = savedSettings.bgUrl || '';

                document.body.className = theme === 'default' ? '' : `theme-${theme}`;

                if (bgUrl) {
                    document.body.style.backgroundImage = `url('${bgUrl}')`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundAttachment = 'fixed';
                } else {
                    // Don't override the CSS background gradient when no custom background is set
                    document.body.style.backgroundImage = '';
                }
            } catch (err) {
                console.error("Theme sync failed:", err);
            }
        }

        syncEdulearnTheme();

        window.addEventListener('storage', (e) => {
            if (e.key === 'el_settings') {
                syncEdulearnTheme();
            }
        });

        const searchParams = new URLSearchParams(window.location.search);
        if (searchParams.get('privacy')) {
            if(typeof loadPrivacy === 'function') loadPrivacy();
        }

        // Failsafe for the close button if your script.js doesn't have it defined
        if (typeof closeZone !== 'function') {
            window.closeZone = function() {
                document.getElementById('zoneViewer').classList.remove('active');
                document.getElementById('zoneViewer').style.display = 'none';
                document.getElementById('zoneFrame').src = ''; // Clear iframe to stop audio
            }
        }
    </script>
</body>
</html>
