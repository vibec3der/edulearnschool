<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLearn— Academic Courses & Resources</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

        /* --- IMPORTED THEME SYSTEM FROM EDULEARN LITE --- */
        :root {
            /* Default: Midnight Indigo / Mint */
            --bg-color: #09090b;
            --bg-toolbar: rgba(9, 9, 11, 0.85);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #86efac;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-hover: rgba(134, 239, 172, 0.05);
            --border-color: #27272a;
            --border-hover: #3f3f46;
            --accent-glow: rgba(134, 239, 172, 0.15);
            --grid-color: rgba(255, 255, 255, 0.02);
        }

        body.theme-mocha {
            --bg-color: #1e1e2e;
            --bg-toolbar: rgba(30, 30, 46, 0.85);
            --text-main: #cdd6f4;
            --text-muted: #a6adc8;
            --accent: #cba6f7;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-hover: rgba(203, 166, 247, 0.05);
            --border-color: #313244;
            --border-hover: #45475a;
            --accent-glow: rgba(203, 166, 247, 0.15);
            --grid-color: rgba(255, 255, 255, 0.02);
        }

        body.theme-inverted {
            --bg-color: #f4f4f5;
            --bg-toolbar: rgba(244, 244, 245, 0.85);
            --text-main: #18181b;
            --text-muted: #52525b;
            --accent: #4f46e5;
            --card-bg: rgba(0, 0, 0, 0.02);
            --card-hover: rgba(79, 70, 229, 0.05);
            --border-color: #e4e4e7;
            --border-hover: #d4d4d8;
            --accent-glow: rgba(79, 70, 229, 0.15);
            --grid-color: rgba(0, 0, 0, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
            
            /* Background Grid */
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        #library-view { padding: 40px; overflow-y: auto; height: 100%; position: relative; z-index: 10; }
        .container { max-width: 900px; margin: 0 auto; }

        header { margin-bottom: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 36px; font-weight: 700; letter-spacing: 1px; margin: 0; text-transform: lowercase; }
        .subtitle { color: var(--text-muted); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-left: auto; }

        /* --- DIRECTORY LIST STYLES --- */
        .directory-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .dir-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px 24px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }

        .dir-row:hover {
            border-color: var(--accent);
            background: var(--card-hover);
            transform: translateX(4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .dir-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .dir-icon {
            font-size: 24px;
            color: var(--text-muted);
            transition: color 0.2s;
            width: 30px;
            text-align: center;
        }

        .dir-row:hover .dir-icon {
            color: var(--accent);
        }

        .dir-text {
            display: flex;
            flex-direction: column;
        }

        .dir-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dir-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.5;
        }

        .sys-badge {
            font-size: 11px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 3px 8px;
            border-radius: 4px;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dir-actions {
            display: flex;
            gap: 12px;
        }

        .btn-list {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-hover);
            padding: 8px 18px;
            border-radius: 9999px; /* Pill Shape */
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-list:hover {
            background: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .dir-row { flex-direction: column; align-items: flex-start; gap: 20px; }
            .dir-actions { width: 100%; justify-content: flex-start; }
            .btn-list { flex: 1; justify-content: center; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>

<body>

    <div id="library-view">
        <div class="container">
            <header>
                <h1>rom directory</h1>
                <p class="subtitle">Emulator Files</p>
            </header>
            
            <div id="rom-container" class="directory-list">
                </div>
        </div>
    </div>

    <script>
        // --- YOUR ROM FILES ---
        const romLibrary = [
            {
                title: "Super Mario Bros",
                fileUrl: "./romsgames/supermariobros.zip", 
                core: "nes",
                desc: "The 8-bit platforming classic that started it all."
            },
            {
                title: "Mario Kart DS",
                fileUrl: "./romsgames/mariokartds.zip",
                core: "nds",
                desc: "Race against friends in this fast-paced karting legend."
            },
            {
                title: "Pokémon Platinum",
                fileUrl: "./roms/pokemonplatinum.zip",
                core: "nds",
                desc: "Explore the Sinnoh region, catch monsters, and conquer the Elite Four."
            },
            {
                title: "The Legend of Zelda",
                fileUrl: "./romsgames/legendofzelda.zip",
                core: "nes",
                desc: "It's dangerous to go alone! Take this classic top-down adventure."
            },
            {
                title: "LEGO Star Wars",
                fileUrl: "./romsgames/legostarwars.zip",
                core: "nds",
                desc: "Play through the epic sci-fi saga in blocky, stud-collecting form."
            }
        ];

        // --- RENDER DIRECTORY ---
        const container = document.getElementById('rom-container');
        
        romLibrary.forEach(rom => {
            const row = document.createElement('div');
            row.className = 'dir-row';
            
            row.innerHTML = `
                <div class="dir-info">
                    <div class="dir-icon">
                        <i class="fa-solid fa-file-zipper"></i>
                    </div>
                    <div class="dir-text">
                        <div class="dir-title">
                            ${rom.title} 
                            <span class="sys-badge">${rom.core}</span>
                        </div>
                        <div class="dir-desc">${rom.desc}</div>
                    </div>
                </div>
                <div class="dir-actions">
                    <button class="btn-list" onclick="playRom('${rom.fileUrl}')">
                        <i class="fa-solid fa-play"></i> Play Web
                    </button>
                    <button class="btn-list" onclick="downloadRom('${rom.fileUrl}')">
                        <i class="fa-solid fa-download"></i> Download
                    </button>
                </div>
            `;
            container.appendChild(row);
        });

        // --- ACTIONS ---
        function downloadRom(url) {
            // Opens the file link directly, triggering a download
            window.open(url, '_blank');
        }

        function playRom(url) {
            // 1. Alert the user on how to play
            alert("To play this game, please open 'WebRetro' from the Tools section, then load the ROM file that is about to download!");
            
            // 2. Automatically trigger the download
            downloadRom(url);
        }

        // --- THEME SYNC ---
        function syncEdulearnTheme() {
            try {
                const savedSettings = JSON.parse(localStorage.getItem('el_settings')) || {};
                document.body.className = savedSettings.theme === 'default' ? '' : `theme-${savedSettings.theme}`;
                
                if (savedSettings.bgUrl) {
                    document.body.style.backgroundImage = `url('${savedSettings.bgUrl}')`;
                    document.body.style.backgroundSize = 'cover'; 
                    document.body.style.backgroundPosition = 'center'; 
                    document.body.style.backgroundAttachment = 'fixed';
                } else {
                    document.body.style.backgroundImage = `
                        linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                        linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px)
                    `;
                    document.body.style.backgroundSize = '40px 40px';
                }
            } catch (err) {
                console.error("Theme sync failed:", err);
            }
        }
        
        syncEdulearnTheme();
        window.addEventListener('storage', (e) => { 
            if (e.key === 'el_settings') syncEdulearnTheme(); 
        });
    </script>
</body>
</html>
