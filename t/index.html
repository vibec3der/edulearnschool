<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

        :root {
            /* Edulearn Theme Colors */
            --bg-color: #09090b;
            --topbar-bg: rgba(9, 9, 11, 0.85);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-hover: rgba(134, 239, 172, 0.05);
            --border-color: #27272a;
            --border-hover: #3f3f46;
            --accent: #86efac;
            --input-bg: #121214;
            
            --danger: #f87171;
            --success: #86efac;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- TOP BAR --- */
        .topbar {
            background-color: var(--topbar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 40px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 1px;
            text-transform: lowercase;
            cursor: default;
            transition: 0.2s ease;
        }

        .topbar-brand:hover {
            transform: scale(1.05);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .search-container {
            position: relative;
        }

        .search-input {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 16px 10px 38px;
            border-radius: 8px;
            font-size: 14px;
            width: 280px;
            transition: 0.2s;
            font-family: inherit;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--text-main);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        /* --- MAIN CONTENT --- */
        .main-container {
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .category-header {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }

        .category-header span {
            color: var(--accent);
            font-weight: 700;
        }

        /* --- GRID --- */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            min-height: 60px;
            position: relative;
        }

        .tool-card:hover {
            background: var(--card-hover);
            border-color: var(--accent);
            transform: translateY(-4px);
        }

        .tool-card:active {
            transform: scale(0.98);
        }

        .tool-name {
            font-weight: 500;
            font-size: 14px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }
        
        .tool-card:hover .tool-name {
            color: var(--accent);
        }

        /* --- TOOL OVERLAY (IFRAME VIEW) --- */
        .tool-view-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .tool-view-overlay.active {
            display: flex;
        }

        .tool-header-bar {
            height: 60px;
            background: var(--topbar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 30px;
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--border-hover);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: 9999px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
            font-family: inherit;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .tool-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #000;
        }

        /* --- TOAST --- */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            z-index: 3000;
        }

        .toast {
            background: var(--topbar-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .toast i { color: var(--success); font-size: 16px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="topbar-brand">Useful tools</div>
        <div class="search-container">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search tools...">
        </div>
    </div>

    <div class="main-container">
        <div class="category-header">
            <i class="fa-solid fa-wrench" style="margin-right: 4px;"></i> All Tools <span id="toolCount">(0)</span>
        </div>
        
        <div class="tools-grid" id="toolsGrid"></div>
    </div>

    <div id="toolOverlay" class="tool-view-overlay">
        <div class="tool-header-bar">
            <button class="btn-back" onclick="closeTool()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
        </div>
        <iframe id="toolFrame" class="tool-frame" src=""></iframe>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Tool Data Configuration
        const tools = [
            { name: "E2E v2", url: "./e2ev2.html", action: "open" },
            { name: "WebRetro", url: "./webretro-standalone.html", action: "open" },
            { name: "ROM files", url: "./roms.html", action: "open" },
            { name: "Sh1mmer", url: "https://sh1mmer.me", action: "copy" },
            { name: "ExtPrint3r", url: "https://extprint3r.github.io/", action: "copy" },
            { name: "Versioner", url: "https://vibec3der.github.io/chromeos-versioner", action: "copy" },
            { name: "Old Bypasses", url: "https://chessisfornerds.netlify.app", action: "copy" },
            { name: "Ingot", url: "https://ingot.k12.lol", action: "copy" }
        ];

        const grid = document.getElementById('toolsGrid');
        const searchInput = document.getElementById('searchInput');
        const toolCountLabel = document.getElementById('toolCount');

        // Render Cards
        function renderTools(filter = "") {
            grid.innerHTML = "";
            const filtered = tools.filter(t => 
                t.name.toLowerCase().includes(filter.toLowerCase())
            );

            toolCountLabel.innerText = `(${filtered.length})`;

            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; color: var(--text-muted); font-size: 14px; text-align: center; padding: 40px 0;">No tools found.</div>`;
                return;
            }

            filtered.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';
                card.onclick = () => handleToolClick(tool);
                card.title = tool.action === 'open' ? 'Click to open' : 'Click to copy link';
                
                card.innerHTML = `<div class="tool-name">${tool.name}</div>`;
                grid.appendChild(card);
            });
        }

        // Handle Click (Switch Logic)
        function handleToolClick(tool) {
            if (tool.action === 'open') {
                openToolView(tool.url);
            } else {
                copyToClipboard(tool.url, tool.name);
            }
        }

        // Open Tool Logic
        function openToolView(url) {
            const overlay = document.getElementById('toolOverlay');
            const frame = document.getElementById('toolFrame');
            frame.src = url;
            overlay.classList.add('active');
        }

        // Close Tool Logic (Back Button)
        function closeTool() {
            const overlay = document.getElementById('toolOverlay');
            const frame = document.getElementById('toolFrame');
            overlay.classList.remove('active');
            frame.src = "about:blank"; // Stop any media/scripts running
        }

        // Copy Logic
        async function copyToClipboard(text, name) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(`Copied URL for ${name}`);
            } catch (err) {
                showToast('Failed to copy', true);
            }
        }

        // Toast Notification
        function showToast(msg, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            const icon = isError ? 'fa-circle-xmark' : 'fa-circle-check';
            const color = isError ? 'var(--danger)' : 'var(--success)';
            
            toast.innerHTML = `<i class="fa-solid ${icon}" style="color: ${color}"></i> ${msg}`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Search Listener
        searchInput.addEventListener('input', (e) => {
            renderTools(e.target.value);
        });

        // Initial Load
        renderTools();
    </script>
</body>
</html>
