<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLearn — Academic Courses & Resources</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            /* --- CLEAN & BUBBLY THEME (Default Blue) --- */
            --bg-gradient-1: #0a1128;
            --bg-gradient-2: #001f54;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --bubble-glass: rgba(59, 130, 246, 0.08);
            --bubble-border: rgba(59, 130, 246, 0.15);
            --bubble-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --bounce: cubic-bezier(0.175, 0.885, 0.32, 1.4);
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Status Colors */
            --danger: #ef4444;
            --danger-hover: #f87171;
            --success: #4ade80;
        }

        /* --- GLASSMORPHISM THEMES --- */
        [data-theme="sakura"] {
            --bg-gradient-1: #2b1820;
            --bg-gradient-2: #4a2530;
            --primary: #ff8fa3;
            --primary-hover: #ffb3c1;
            --bubble-glass: rgba(255, 183, 197, 0.08);
            --bubble-border: rgba(255, 183, 197, 0.2);
            --text-main: #fff0f3;
            --text-muted: rgba(255, 240, 243, 0.7);
        }

        [data-theme="red"] {
            --bg-gradient-1: #1a0505;
            --bg-gradient-2: #330000;
            --primary: #ef4444;
            --primary-hover: #f87171;
            --bubble-glass: rgba(255, 68, 68, 0.08);
            --bubble-border: rgba(255, 68, 68, 0.2);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        [data-theme="azure"] {
            --bg-gradient-1: #0a1128;
            --bg-gradient-2: #001f54;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --bubble-glass: rgba(59, 130, 246, 0.08);
            --bubble-border: rgba(59, 130, 246, 0.2);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: all 0.4s var(--smooth);
        }

        /* --- TOP BAR --- */
        .topbar {
            background: rgba(20, 15, 35, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--bubble-border);
            padding: 0 40px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .topbar-brand {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.02em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s var(--bounce);
        }

        .topbar-brand i { color: var(--primary-hover); width: 24px; height: 24px; }
        .topbar-brand:hover { transform: translateY(-2px); text-shadow: 0 0 15px var(--primary); }

        /* --- SEARCH BAR --- */
        .search-container { position: relative; }

        .search-input {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--bubble-border);
            color: var(--text-main);
            padding: 10px 16px 10px 42px;
            border-radius: 999px; /* Pill shape */
            font-size: 15px;
            font-weight: 600;
            width: 280px;
            transition: all 0.3s var(--smooth);
            font-family: inherit;
            outline: none;
            backdrop-filter: blur(10px);
        }

        .search-input::placeholder { color: var(--text-muted); font-weight: 500; }

        .search-input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.2);
            width: 320px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.3s;
        }

        .search-input:focus ~ .search-icon { color: var(--primary); }

        /* --- MAIN CONTENT --- */
        .main-container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .category-header {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-header i { width: 18px; height: 18px; color: var(--primary); }

        /* --- GRID & CARDS --- */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .tool-card {
            background: var(--bubble-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--bubble-border);
            border-radius: 20px;
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s var(--bounce);
            text-align: center;
            min-height: 80px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .tool-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-hover);
            transform: translateY(-6px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3), 0 0 15px rgba(157, 78, 221, 0.2);
        }

        .tool-card:active { transform: scale(0.95); }

        .tool-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- CONTROLLED SANDBOX OVERLAY --- */
        .tool-view-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .tool-view-overlay.active { display: flex; opacity: 1; }

        .sandbox-container {
            width: 90%;
            max-width: 1200px;
            height: 85vh;
            background: var(--bg-gradient-1);
            border: 1px solid var(--bubble-border);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--bubble-shadow);
            position: relative;
            transform: scale(0.95);
            transition: transform 0.4s var(--bounce);
        }

        .tool-view-overlay.active .sandbox-container { transform: scale(1); }

        .tool-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #ffffff;
        }

        /* The Bubbly Bottom Toolbar */
        .sandbox-toolbar {
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid var(--bubble-border);
            padding: 12px 24px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .sandbox-toolbar button {
            background: var(--bubble-glass);
            color: var(--text-main);
            border: 1px solid var(--bubble-border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s var(--bounce);
        }

        .sandbox-toolbar button:hover { 
            background: var(--primary);
            border-color: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4);
        }
        
        .sandbox-toolbar button i { width: 20px; height: 20px; }

        .sandbox-toolbar .btn-danger {
            margin-left: auto;
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        .sandbox-toolbar .btn-danger:hover {
            background: var(--danger);
            border-color: var(--danger-hover);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        /* --- TOAST NOTIFICATIONS --- */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            z-index: 3000;
        }

        .toast {
            background: rgba(20, 15, 35, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--bubble-border);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 999px; /* Pill shape for toasts */
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.4s var(--bounce) forwards;
        }

        .toast i { width: 18px; height: 18px; }
        .toast.success i { color: var(--success); filter: drop-shadow(0 0 8px rgba(74, 222, 128, 0.4)); }
        .toast.error i { color: var(--danger); filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.4)); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px) scale(0.95); }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="topbar-brand" onclick="window.location.href='/h/'">
            <i data-lucide="home"></i> Home
        </div>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search tools...">
            <i data-lucide="search" class="search-icon"></i>
        </div>
    </div>

    <div class="main-container">
        <div class="category-header">
            <i data-lucide="wrench"></i> All Tools <span id="toolCount">(0)</span>
        </div>
        
        <div class="tools-grid" id="toolsGrid"></div>
    </div>

    <div id="toolOverlay" class="tool-view-overlay">
        <div class="sandbox-container" id="sandboxContainer">
            
            <iframe id="toolFrame" class="tool-frame" src=""></iframe>
            
            <div class="sandbox-toolbar">
                <button onclick="fullscreenTool()" title="Fullscreen"><i data-lucide="maximize"></i></button>
                <button onclick="document.getElementById('toolFrame').src = document.getElementById('toolFrame').src" title="Refresh"><i data-lucide="refresh-cw"></i></button>
                <button onclick="copyCurrentToolLink()" title="Copy Link"><i data-lucide="copy"></i></button>
                <button onclick="openToolExternal()" title="Open in New Tab"><i data-lucide="external-link"></i></button>
                
                <button class="btn-danger" onclick="closeTool()" title="Close Sandbox">
                    <i data-lucide="x"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Apply Theme and Initialize Icons
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            const savedData = JSON.parse(localStorage.getItem('edulearn_settings')) || {};
            if (savedData.theme) {
                document.body.setAttribute('data-theme', savedData.theme);
            }
        });

        const tools = [
            { name: "E2E v2", url: "/e2ev2.html", action: "open" },
            { name: "WebRetro", url: "/webretro-standalone.html", action: "open" },
            { name: "ROM files", url: "/roms.html", action: "open" },
            { name: "Sh1mmer", url: "https://sh1mmer.me", action: "copy" },
            { name: "ExtPrint3r", url: "https://extprint3r.github.io/", action: "copy" },
            { name: "Versioner", url: "https://vibec3der.github.io/chromeos-versioner", action: "copy" },
            { name: "Old Bypasses", url: "https://chessisfornerds.netlify.app", action: "copy" },
            { name: "Ingot", url: "https://ingot.k12.lol", action: "copy" }
        ];

        const grid = document.getElementById('toolsGrid');
        const searchInput = document.getElementById('searchInput');
        const toolCountLabel = document.getElementById('toolCount');
        const frame = document.getElementById('toolFrame');

        function renderTools(filter = "") {
            grid.innerHTML = "";
            const filtered = tools.filter(t => 
                t.name.toLowerCase().includes(filter.toLowerCase())
            );

            toolCountLabel.innerText = `(${filtered.length})`;

            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; color: var(--text-muted); font-size: 15px; font-weight: 600; text-align: center; padding: 40px 0;">No tools found.</div>`;
                return;
            }

            filtered.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';
                card.onclick = () => handleToolClick(tool);
                card.title = tool.action === 'open' ? 'Click to open in sandbox' : 'Click to copy link';
                
                card.innerHTML = `<div class="tool-name">${tool.name}</div>`;
                grid.appendChild(card);
            });
        }

        function handleToolClick(tool) {
            if (tool.action === 'open') {
                openToolView(tool.url);
            } else {
                copyToClipboard(tool.url, tool.name);
            }
        }

        function openToolView(url) {
            const overlay = document.getElementById('toolOverlay');
            frame.src = url;
            overlay.classList.add('active');
        }

        function closeTool() {
            const overlay = document.getElementById('toolOverlay');
            overlay.classList.remove('active');
            setTimeout(() => { frame.src = "about:blank"; }, 300); // Wait for fade before clearing src
        }

        // --- Sandbox Toolbar Actions ---
        function fullscreenTool() {
            const container = document.getElementById('sandboxContainer');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function copyCurrentToolLink() {
            if (frame.src && frame.src !== "about:blank") {
                copyToClipboard(frame.src, "Current Tool");
            }
        }

        function openToolExternal() {
            if (frame.src && frame.src !== "about:blank") {
                window.open(frame.src, '_blank');
            }
        }

        // --- Utilities ---
        async function copyToClipboard(text, name) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(`Copied URL for ${name}`);
            } catch (err) {
                showToast('Failed to copy', true);
            }
        }

        function showToast(msg, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            // Add success/error class for specific icon coloring
            toast.className = `toast ${isError ? 'error' : 'success'}`;
            const iconName = isError ? 'x-circle' : 'check-circle';
            
            toast.innerHTML = `<i data-lucide="${iconName}"></i> ${msg}`;
            container.appendChild(toast);
            
            // Re-initialize Lucide for the newly injected icon
            lucide.createIcons();

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        searchInput.addEventListener('input', (e) => {
            renderTools(e.target.value);
        });

        renderTools();
    </script>
    <script src="/script.js" defer></script>
</body>
</html>
