<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edulearn | Geography</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            /* --- NEW EDULEARN THEME VARIABLES --- */
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --modal-bg: #0a0a0a;
            --modal-border: #222222;
            --input-bg: #000000;
            --input-border: #333333;
            --pill-hover: rgba(255, 255, 255, 0.1);
            --pill-active: #222222;
            --accent-glow: rgba(255, 255, 255, 0.1);
            
            --danger: #f87171;
            --success: #86efac;
        }

        /* --- THEMES --- */
        [data-theme="sakura"] {
            --bg-color: #fdf6f5;
            --text-main: #4a3b3c;
            --text-muted: #9e8487;
            --modal-bg: #ffffff;
            --modal-border: #f0e4e4;
            --input-bg: #fdf6f5;
            --input-border: #e6d3d3;
            --pill-hover: rgba(255, 183, 197, 0.4);
            --accent-glow: rgba(255, 183, 197, 0.3);
        }

        [data-theme="red"] {
            --bg-color: #0a0000;
            --text-main: #ff4d4d;
            --text-muted: #802b2b;
            --modal-bg: #140000;
            --modal-border: #330000;
            --input-bg: #0a0000;
            --input-border: #4d0000;
            --pill-hover: rgba(255, 0, 0, 0.15);
            --accent-glow: rgba(255, 77, 77, 0.2);
        }

        [data-theme="azure"] {
            --bg-color: #faf9f8;
            --text-main: #323130;
            --text-muted: #605e5c;
            --modal-bg: #ffffff;
            --modal-border: #edebe9;
            --input-bg: #ffffff;
            --input-border: #8a8886;
            --pill-hover: #f3f2f1;
            --accent-glow: rgba(0, 120, 212, 0.2);
        }

        /* --- FORCE ALL ICONS VERY WHITE --- */
        i, svg, [class^="fa-"], [class*=" fa-"] {
            color: #ffffff !important;
            filter: brightness(1.5);
            text-shadow: 0 0 8px rgba(255,255,255,0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #16213e 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* --- TOP BAR --- */
        .topbar {
            background-color: var(--modal-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--modal-border);
            padding: 0 40px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .topbar-brand {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.04em;
            cursor: pointer;
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-brand:hover {
            transform: translateY(-2px);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .search-container {
            position: relative;
        }

        .search-input {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            padding: 10px 16px 10px 38px;
            border-radius: 8px;
            font-size: 14px;
            width: 280px;
            transition: 0.2s;
            font-family: inherit;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--text-main);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        /* --- MAIN CONTENT --- */
        .main-container {
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .category-header {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }

        /* --- GRID & CARDS --- */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .tool-card {
            background: var(--modal-bg);
            border: 1px solid var(--modal-border);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            min-height: 60px;
            position: relative;
        }

        .tool-card:hover {
            background: var(--pill-hover);
            transform: translateY(-4px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .tool-card:active {
            transform: scale(0.98);
        }

        .tool-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }

        /* --- CONTROLLED SANDBOX OVERLAY --- */
        .tool-view-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .tool-view-overlay.active {
            display: flex;
        }

        .sandbox-container {
            width: 85%;
            max-width: 1000px;
            height: 85vh;
            background: var(--bg-color);
            border: 1px solid var(--modal-border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px var(--accent-glow);
            position: relative;
        }

        .tool-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #fff; /* Keep iframe white inside */
        }

        /* The Dark Bottom Toolbar */
        .sandbox-toolbar {
            background-color: var(--modal-bg);
            border-top: 1px solid var(--modal-border);
            padding: 12px 20px;
            display: flex;
            gap: 12px;
        }

        .sandbox-toolbar button {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .sandbox-toolbar button:hover { 
            background-color: var(--pill-hover); 
            box-shadow: 0 0 10px var(--accent-glow);
        }
        
        .sandbox-toolbar button svg { width: 18px; height: 18px; }

        /* --- TOAST --- */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            z-index: 3000;
        }

        .toast {
            background: var(--modal-bg);
            border: 1px solid var(--modal-border);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px var(--accent-glow);
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="topbar-brand" onclick="window.location.href='/h/'">
            <i class="fa-solid fa-house" style="font-size: 18px; margin-right: 4px;"></i> Home
        </div>
        
        <div class="search-container">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search tools...">
        </div>
    </div>

    <div class="main-container">
        <div class="category-header">
            <i class="fa-solid fa-wrench" style="margin-right: 4px;"></i> All Tools <span id="toolCount">(0)</span>
        </div>
        
        <div class="tools-grid" id="toolsGrid"></div>
    </div>

    <div id="toolOverlay" class="tool-view-overlay">
        <div class="sandbox-container" id="sandboxContainer">
            
            <iframe id="toolFrame" class="tool-frame" src=""></iframe>
            
            <div class="sandbox-toolbar">
                <button onclick="fullscreenTool()" title="Fullscreen">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
                
                <button onclick="document.getElementById('toolFrame').src = document.getElementById('toolFrame').src" title="Refresh">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
                
                <button onclick="copyCurrentToolLink()" title="Copy Link">
                    <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
                </button>
                
                <button onclick="openToolExternal()" title="Open in New Tab">
                    <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                </button>

                <button onclick="closeTool()" title="Close Sandbox" style="margin-left: auto; border-color: var(--danger); background: transparent;">
                    <i class="fa-solid fa-xmark" style="color: var(--danger) !important; filter: none; text-shadow: none;"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Check for theme in local storage to apply it automatically
        document.addEventListener('DOMContentLoaded', () => {
            const savedData = JSON.parse(localStorage.getItem('edulearn_settings')) || {};
            if (savedData.theme) {
                document.body.setAttribute('data-theme', savedData.theme);
            }
        });

        const tools = [
            { name: "E2E v2", url: "/e2ev2.html", action: "open" },
            { name: "WebRetro", url: "/webretro-standalone.html", action: "open" },
            { name: "ROM files", url: "/roms.html", action: "open" },
            { name: "Sh1mmer", url: "https://sh1mmer.me", action: "copy" },
            { name: "ExtPrint3r", url: "https://extprint3r.github.io/", action: "copy" },
            { name: "Versioner", url: "https://vibec3der.github.io/chromeos-versioner", action: "copy" },
            { name: "Old Bypasses", url: "https://chessisfornerds.netlify.app", action: "copy" },
            { name: "Ingot", url: "https://ingot.k12.lol", action: "copy" }
        ];

        const grid = document.getElementById('toolsGrid');
        const searchInput = document.getElementById('searchInput');
        const toolCountLabel = document.getElementById('toolCount');
        const frame = document.getElementById('toolFrame');

        function renderTools(filter = "") {
            grid.innerHTML = "";
            const filtered = tools.filter(t => 
                t.name.toLowerCase().includes(filter.toLowerCase())
            );

            toolCountLabel.innerText = `(${filtered.length})`;

            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; color: var(--text-muted); font-size: 14px; text-align: center; padding: 40px 0;">No tools found.</div>`;
                return;
            }

            filtered.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';
                card.onclick = () => handleToolClick(tool);
                card.title = tool.action === 'open' ? 'Click to open in sandbox' : 'Click to copy link';
                
                card.innerHTML = `<div class="tool-name">${tool.name}</div>`;
                grid.appendChild(card);
            });
        }

        function handleToolClick(tool) {
            if (tool.action === 'open') {
                openToolView(tool.url);
            } else {
                copyToClipboard(tool.url, tool.name);
            }
        }

        function openToolView(url) {
            const overlay = document.getElementById('toolOverlay');
            frame.src = url;
            overlay.classList.add('active');
        }

        function closeTool() {
            const overlay = document.getElementById('toolOverlay');
            overlay.classList.remove('active');
            frame.src = "about:blank"; // Stop background processes/audio
        }

        // --- Sandbox Toolbar Actions ---
        function fullscreenTool() {
            const container = document.getElementById('sandboxContainer');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function copyCurrentToolLink() {
            if (frame.src && frame.src !== "about:blank") {
                copyToClipboard(frame.src, "Current Tool");
            }
        }

        function openToolExternal() {
            if (frame.src && frame.src !== "about:blank") {
                window.open(frame.src, '_blank');
            }
        }

        // --- Utilities ---
        async function copyToClipboard(text, name) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(`Copied URL for ${name}`);
            } catch (err) {
                showToast('Failed to copy', true);
            }
        }

        function showToast(msg, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            const icon = isError ? 'fa-circle-xmark' : 'fa-circle-check';
            const color = isError ? 'var(--danger)' : 'var(--success)';
            
            // Override force-white for toast icons so success/error colors show
            toast.innerHTML = `<i class="fa-solid ${icon}" style="color: ${color} !important; filter: none; text-shadow: none;"></i> ${msg}`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        searchInput.addEventListener('input', (e) => {
            renderTools(e.target.value);
        });

        renderTools();
    </script>
</body>
</html>
