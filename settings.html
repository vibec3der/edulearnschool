<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
        <title>proxy | credit</title>
        <base href="/algebra.html" />
        <link rel="shortcut icon" content="favicon.ico" />
        
        <style>
            /* CSS Reset & Base */
            * {
                box-sizing: border-box;
            }

            body, html {
                margin: 0;
                padding: 0;
                height: 100%;
                background-color: #000000;
                color: #ffffff;
                font-family: sans-serif;
                display: flex;
                flex-direction: column;
            }

            /* Layout */
            .wrapper {
                flex-grow: 1;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .center {
                width: 100%;
                max-width: 450px;
                padding: 20px;
            }

            /* Typography & Elements */
            .logo-wrapper h1 {
                font-size: 26px;
                font-weight: 400;
                margin-top: 0;
                margin-bottom: 24px;
                letter-spacing: 0.5px;
            }

            .desc p {
                margin: 0 0 8px 0;
                font-size: 14px;
                color: #cccccc;
            }

            input[type="text"], .sj-select {
                width: 100%;
                padding: 12px 14px;
                background-color: #0a0a0a;
                color: #ffffff;
                border: 1px solid #333333;
                border-radius: 6px;
                font-size: 14px;
                margin-bottom: 24px;
                outline: none;
                font-family: sans-serif;
                transition: border-color 0.2s ease;
                appearance: auto; /* Keeps native dropdown arrow but styles the box */
            }

            input[type="text"]:focus, .sj-select:focus {
                border-color: #666666;
            }

            input[type="text"]::placeholder {
                color: #666666;
            }

            /* Footer */
            .footer {
                text-align: center;
                padding: 24px;
                font-size: 14px;
            }

            .footer a {
                color: #888888;
                text-decoration: none;
                transition: color 0.2s ease;
            }

            .footer a:hover {
                color: #ffffff;
            }
        </style>
    </head>

    <body>
        <div class="wrapper">
            <div class="center">
                <div class="logo-wrapper left-margin">
                    <h1>Scramjet | settings</h1>
                </div>
                <div class="desc left-margin">
                    <p>wisp server:</p>
                    <input id="sj-address" type="text" placeholder="" autocomplete="off" />
                    
                    <p>transport:</p>
                    <select class="sj-select">
                        <option value="libcurl">libcurl (slightly slower, more secure)</option>
                        <option value="epoxy">epoxy (fastest)</option>
                    </select>
                </div>
            </div>
        </div>
        
        

        <script>
            const addressInput = document.getElementById("sj-address");
            const transportSelect = document.querySelector(".sj-select");

            const savedWisp = localStorage.getItem("wispUrl");
            if (savedWisp) {
                addressInput.placeholder = savedWisp;
            }

            let savedTransport = localStorage.getItem("transport");

            if (savedTransport !== "epoxy" && savedTransport !== "libcurl") {
                savedTransport = "libcurl";
                localStorage.setItem("transport", savedTransport);
            }

            transportSelect.value = savedTransport;

            addressInput.addEventListener("keydown", function (e) {
                if (e.key === "Enter") {
                    let value = this.value.trim();

                    if (!value.startsWith("wss://")) value = "wss://" + value;
                    if (!value.endsWith("/")) value += "/";

                    localStorage.setItem("wispUrl", value);
                    this.placeholder = value;
                    this.value = "";
                }
            });

            transportSelect.addEventListener("change", function () {
                localStorage.setItem("transport", this.value);
            });
        </script>
    </body>
</html>
