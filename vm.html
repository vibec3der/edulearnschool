<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>edulearn vms</title>
<link rel="icon" href="https://cdn.classlink.com/production/launchpad/resources/images/favicon/favicon-32x32.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg-color: #09090b;
  --grid-color: rgba(255,255,255,0.02);
  --pill-hover: rgba(255,255,255,0.05);
  --pill-active: #27272a;
  --text-main: #ffffff;
  --text-muted: #a1a1aa;
  --input-bg: #09090b;
  --input-border: #3f3f46;
}

* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter', system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-main); overflow:hidden; display:flex; flex-direction:column; height:100vh; }

.grid-bg {
  position:absolute; inset:0; z-index:-2;
  background-image: linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                    linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
  background-size: 40px 40px;
}

.topbar { position:fixed; top:0; left:0; width:100%; height:80px; display:flex; align-items:center; justify-content:space-between; padding:0 40px; z-index:100; }
.brand { font-family:'Dancing Script', cursive; font-size:32px; color: var(--text-main); text-decoration:none; cursor:default; display:flex; align-items:center; letter-spacing:1px; text-transform:lowercase; }
.controls { display:flex; gap:12px; align-items:center; }
.clean-btn { background:transparent; color:var(--text-main); border:1px solid var(--input-border); padding:8px 18px; border-radius:9999px; font-size:13px; font-weight:500; cursor:pointer; transition:0.2s; display:inline-flex; align-items:center; justify-content:center; height:38px; }
.clean-btn:hover { background:var(--pill-hover); }
.btn-primary { background:var(--text-main); color:var(--bg-color); border:none; font-weight:600; }
.btn-primary:hover { background:var(--text-muted); }

.main-content { flex:1; margin-top:80px; position:relative; z-index:10; display:flex; flex-direction:column; width:100%; height:calc(100vh - 80px); padding:20px 20px 20px 20px; align-items:center; }

.header-section { display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:12px; }
.hero-title { font-family:'Dancing Script', cursive; font-size:56px; font-weight:700; margin:0; color:var(--text-main); letter-spacing:2px; text-transform:lowercase; text-shadow:0 4px 20px rgba(0,0,0,0.5); line-height:1; }

#container { width:100%; height:100%; background:#000; border-radius:0; overflow:hidden; display:flex; }
#container iframe { flex:1; width:100% !important; height:100% !important; border:0; }

.key-selector-container { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
.key-selector-container input { padding:6px 10px; border-radius:8px; border:1px solid var(--input-border); background: var(--input-bg); color: var(--text-main); width:120px; }
.key-selector-container select { padding:6px 10px; border-radius:8px; border:1px solid var(--input-border); background: var(--input-bg); color: var(--text-main); }

.timer { color: var(--text-muted); font-size:14px; margin-bottom:8px; letter-spacing:0.5px; text-align:center; }
</style>
</head>
<body>

<div class="grid-bg"></div>

<nav class="topbar">
  <div class="brand">edulearn vms</div>
  <div class="controls">
    <button class="clean-btn btn-primary" onclick="start()">
      <i class="fa-solid fa-play" style="margin-right:8px;"></i> Start Session
    </button>
    <button class="clean-btn" onclick="stop()">
      <i class="fa-solid fa-stop" style="margin-right:8px;"></i> Stop Session
    </button>
  </div>
</nav>

<main class="main-content">
  <div class="header-section">
    <h1 class="hero-title">edulearn vms</h1>
    <p style="color: var(--text-muted); font-size:14px;">Powered by Hyperbeam</p>
  </div>

  <!-- Dropdown + search -->
  <div class="key-selector-container">
    <input type="text" id="key-search" placeholder="Search key number" oninput="filterKeys()">
    <select id="key-dropdown" onchange="selectKeyFromDropdown()">
      <!-- Options will be dynamically generated -->
    </select>
  </div>

  <!-- Timer -->
  <div class="timer" id="timer">Session time: 15:00</div>

  <!-- Hyperbeam container -->
  <div id="container"></div>
</main>

<script type="module">
import Hyperbeam from 'https://unpkg.com/@hyperbeam/web@latest/dist/index.js';

let hb = null;
let sessionId = null;
let selectedKey = null;
let countdownInterval = null;
const SESSION_DURATION = 900; // 15 min

// Example keys — add as many as you like
const keys = [
  { number: "1", label: "Key 1" },
  { number: "2", label: "Key 2" },
  { number: "3", label: "Key 3" },
  { number: "4", label: "Key 4" },
  { number: "5", label: "Key 5" },
];

// Render dropdown options
function renderDropdown(options) {
  const dropdown = document.getElementById('key-dropdown');
  dropdown.innerHTML = '';
  options.forEach((k, idx) => {
    const opt = document.createElement('option');
    opt.value = k.number;
    opt.innerText = k.label;
    dropdown.appendChild(opt);
    if(idx===0) selectedKey = k.number;
  });
}

// Filter keys based on search input
function filterKeys() {
  const query = document.getElementById('key-search').value.toLowerCase();
  const filtered = keys.filter(k => k.number.toLowerCase().includes(query));
  renderDropdown(filtered);
}

// Handle dropdown selection
function selectKeyFromDropdown() {
  const dropdown = document.getElementById('key-dropdown');
  selectedKey = dropdown.value;
}

// Countdown timer
function startCountdown() {
  clearInterval(countdownInterval);
  let remaining = SESSION_DURATION;
  function updateTimer() {
    const minutes = Math.floor(remaining / 60).toString().padStart(2,'0');
    const seconds = (remaining % 60).toString().padStart(2,'0');
    document.getElementById('timer').innerText = `Session time: ${minutes}:${seconds}`;
    if(remaining <= 0) { stop(); clearInterval(countdownInterval); }
    remaining--;
  }
  updateTimer();
  countdownInterval = setInterval(updateTimer, 1000);
}

async function start() {
  if(!selectedKey) { alert("Select a key!"); return; }
  if(sessionId) await stop();

  const res = await fetch('/api/vmkey', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'create', keyNumber:selectedKey})
  });
  if(!res.ok) { alert('Failed to create VM session'); return; }
  const data = await res.json();
  if(!data || !data.session_id || !data.embed_url) { alert('Invalid response'); return; }

  sessionId = data.session_id;
  hb = await Hyperbeam(document.getElementById('container'), data.embed_url);
  startCountdown();
}

async function stop() {
  if(!sessionId) return;
  clearInterval(countdownInterval);
  document.getElementById('timer').innerText = 'Session time: 15:00';

  await fetch('/api/vmkey', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'delete', sessionId, keyNumber:selectedKey})
  });

  if(hb) { hb.destroy(); hb=null; }
  sessionId=null;
  document.getElementById('container').innerHTML='';
}

// Initialize dropdown
renderDropdown(keys);

window.start = start;
window.stop = stop;
window.selectKeyFromDropdown = selectKeyFromDropdown;
window.filterKeys = filterKeys;
</script>
</body>
</html>
