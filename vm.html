<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VM Test</title>
  <script src="https://unpkg.com/@hyperbeam/web@latest/dist/index.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }
    #container {
      width: 100%;
      height: 600px;
      margin-top: 20px;
      background: #000;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h1>Hyperbeam VM</h1>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<div id="container"></div>

<script>
let hb = null;
let sessionId = null;

async function start() {
  const res = await fetch('/api/vmkey', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'create' })
  });

  const data = await res.json();
  sessionId = data.session_id;

  hb = await Hyperbeam(document.getElementById('container'), data.embed_url);
}

async function stop() {
  if (!sessionId) return;

  await fetch('/api/vmkey', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'delete',
      sessionId
    })
  });

  if (hb) hb.destroy();
}
</script>

</body>
</html>
