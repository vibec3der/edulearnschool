<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Stash</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Clean Dark Theme */
            --bg-color: #0f0f11;
            --topbar-bg: #151518;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --card-bg: #141417;
            --card-hover: #1e1e24;
            --border-color: #27272a;
            --border-hover: #3f3f46;
            --accent: #6366f1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- TOP BAR --- */
        .topbar {
            background-color: var(--topbar-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            background: #1a1a1f;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 15px 8px 35px;
            border-radius: 6px;
            font-size: 0.9rem;
            width: 250px;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--border-hover);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* --- MAIN CONTENT --- */
        .main-container {
            padding: 30px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .category-header {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }

        .category-header span {
            color: var(--text-muted);
            font-weight: normal;
        }

        /* --- GRID --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            min-height: 55px;
        }

        .game-card:hover {
            background: var(--card-hover);
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .game-card:active {
            transform: scale(0.98);
        }

        .game-name {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- GAMEPLAY OVERLAY (IFRAME VIEW) --- */
        .game-view-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .game-view-overlay.active {
            display: flex;
        }

        .game-header-bar {
            height: 50px;
            background: var(--topbar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-back:hover {
            background: var(--card-hover);
        }

        .game-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .controls-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .key-badge {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--text-muted);
        }

        .game-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #000;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="topbar-brand">Ultimate Stash</div>
        <div class="search-container">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search games...">
        </div>
    </div>

    <div class="main-container" id="libraryView">
        <div class="category-header">
            ▼ All Games <span id="gameCount">(0)</span>
        </div>
        
        <div class="game-grid" id="gameGrid"></div>
    </div>

    <div id="gameOverlay" class="game-view-overlay">
        <div class="game-header-bar">
            <div class="toolbar-left">
                <button class="btn-back" onclick="closeGame()">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
                <div class="game-title" id="activeTitle">Game Title</div>
            </div>
            <div class="controls-hint" id="activeControls"></div>
        </div>
        <iframe id="gameFrame" class="game-frame" src="about:blank"></iframe>
    </div>

    <script>
        // Data Configuration
        const gamesList = [
            {
                title: "Hover Drive",
                url: "./g2games/clhoverracerdrive.html",
                controls: "Arrow Keys or WASD to Drive"
            },
            {
                title: "Astra client",
                url: "./g2games/astraclientbeta.html", 
                controls: "WASD to Move, Space to Jump"
            },
            {
                title: "Tuff client",
                url: "./g2games/tuffclientwasm.html", 
                controls: "WASD to Move, Space to Jump"
            },
             {
                title: "Dragon X V3",
                url: "./g2games/dragonxv3.html", 
                controls: "WASD to Move, Space to Jump"
            }
        ];

        const grid = document.getElementById('gameGrid');
        const searchInput = document.getElementById('searchInput');
        const countLabel = document.getElementById('gameCount');

        // Render Games
        function renderGames(filter = "") {
            grid.innerHTML = "";
            const filtered = gamesList.filter(g => 
                g.title.toLowerCase().includes(filter.toLowerCase())
            );

            countLabel.innerText = `(${filtered.length})`;

            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; color: var(--text-muted); padding: 20px 0;">No games found.</div>`;
                return;
            }

            filtered.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => launchGame(game);
                card.title = 'Click to play';
                
                card.innerHTML = `<div class="game-name">${game.title}</div>`;
                grid.appendChild(card);
            });
        }

        // Launch Game
        function launchGame(game) {
            const overlay = document.getElementById('gameOverlay');
            const frame = document.getElementById('gameFrame');
            const activeTitle = document.getElementById('activeTitle');
            const activeControls = document.getElementById('activeControls');
            
            activeTitle.innerText = game.title;
            frame.src = game.url;
            
            if (game.controls) {
                activeControls.innerHTML = `<i class="fa-solid fa-keyboard"></i> <span class="key-badge">${game.controls}</span>`;
            } else {
                activeControls.innerHTML = '';
            }

            overlay.classList.add('active');
        }

        // Close Game
        function closeGame() {
            const overlay = document.getElementById('gameOverlay');
            const frame = document.getElementById('gameFrame');
            
            overlay.classList.remove('active');
            frame.src = "about:blank"; // Stop game instances/audio
        }

        // Search Listener
        searchInput.addEventListener('input', (e) => {
            renderGames(e.target.value);
        });

        // Initial Load
        renderGames();
    </script>
</body>
</html>
